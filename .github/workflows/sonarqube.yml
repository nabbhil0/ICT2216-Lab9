name: SonarQube Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sonarqube:
    name: Scan JavaScript Project

    runs-on:
      - self-hosted
      - windows
      - x64
      - lab9-sonarqube

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify SonarQube is reachable
        shell: powershell
        run: |
          $response = Invoke-RestMethod `
            -Uri "${{ vars.SONAR_HOST_URL }}/api/system/status"

          Write-Host "SonarQube status: $($response.status)"

          if ($response.status -ne "UP") {
            throw "SonarQube is not ready."
          }

      - name: Run SonarQube analysis
        uses: SonarSource/sonarqube-scan-action@v8.2.1
        with:
          skipSignatureVerification: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
